<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>點名 Dashboard · Jesse</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
  .tab { padding: 8px 14px; border-radius: 9999px; cursor:pointer; font-weight:500; }
  .tab-active { background:#0f3e36; color:white; }
  .tab-inactive { background:#e5e7eb; color:#4b5563; }
  .rate-bar { height: 6px; background: #e5e7eb; border-radius: 9999px; overflow:hidden; }
  .rate-fill { height: 100%; background: #22c55e; }
  .alert-row { background: #fef2f2 !important; }
  .warn-row { background: #fffbeb !important; }
  th, td { padding: 8px 6px; font-size: 14px; }
  th { background:#f9fafb; text-align:left; font-weight:600; color:#4b5563; }
  tbody tr { border-top: 1px solid #f3f4f6; }
</style>
</head>
<body class="bg-stone-50 text-gray-900">

<div class="max-w-7xl mx-auto px-4 py-6">

  <!-- 密碼登入 -->
  <div id="login" class="hidden max-w-sm mx-auto bg-white rounded-2xl shadow p-6 mt-12">
    <h2 class="text-lg font-semibold mb-1">Jesse 管理密碼</h2>
    <input id="k-input" type="password" class="w-full text-lg border rounded-xl py-3 px-3 mb-3" placeholder="ADMIN_KEY">
    <button id="k-submit" class="w-full bg-emerald-700 text-white rounded-xl py-3 font-medium">進入</button>
    <p id="k-error" class="text-red-600 text-sm mt-3 hidden"></p>
  </div>

  <!-- 主畫面 -->
  <div id="main" class="hidden">
    <header class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">跑班點名 Dashboard</h1>
      <div class="flex items-center gap-2 text-sm">
        <span id="updated" class="text-gray-500"></span>
        <button id="reload" class="bg-white border rounded-lg px-3 py-1">重新整理</button>
        <button id="logout" class="text-gray-500 underline">登出</button>
      </div>
    </header>

    <!-- 警示橫條 -->
    <div id="alerts" class="mb-4"></div>

    <!-- Tabs -->
    <div class="flex gap-2 mb-4 flex-wrap" id="tabs"></div>

    <!-- View: dashboard / admin -->
    <div class="flex gap-2 mb-4">
      <button id="view-dash" class="tab tab-active">出席儀表</button>
      <button id="view-admin" class="tab tab-inactive">學員管理</button>
    </div>

    <div id="dash-view"></div>
    <div id="admin-view" class="hidden"></div>
  </div>
</div>

<!-- 學員編輯 modal -->
<div id="edit-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
    <h3 id="edit-title" class="text-lg font-semibold mb-4">編輯學員</h3>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-600">班別</label>
        <select id="edit-class" class="w-full border rounded-lg py-2 px-2">
          <option value="tc-tue">台中週二班</option>
          <option value="tp-wed">台北週三班</option>
          <option value="tc-thu">台中週四班</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-600">姓名（全名）</label>
        <input id="edit-name" type="text" class="w-full border rounded-lg py-2 px-2">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-600">VDOT</label>
          <input id="edit-vdot" type="text" class="w-full border rounded-lg py-2 px-2" placeholder="39 / 30+25&quot; / 新">
        </div>
        <div>
          <label class="text-xs text-gray-600">方案</label>
          <input id="edit-plan" type="text" class="w-full border rounded-lg py-2 px-2" placeholder="A/B/C/D/E/F">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-600">狀態</label>
          <select id="edit-status" class="w-full border rounded-lg py-2 px-2">
            <option value="active">active 正常</option>
            <option value="pending_payment">pending_payment 待匯款</option>
            <option value="trial">trial 體驗</option>
            <option value="dropped">dropped 退課</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-600">排序 (小→前)</label>
          <input id="edit-sort" type="number" class="w-full border rounded-lg py-2 px-2" value="999">
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-600">備註</label>
        <textarea id="edit-note" rows="2" class="w-full border rounded-lg py-2 px-2"></textarea>
      </div>
    </div>
    <div class="flex gap-2 mt-5">
      <button id="edit-cancel" class="flex-1 bg-gray-200 rounded-xl py-2">取消</button>
      <button id="edit-delete" class="hidden bg-red-100 text-red-700 rounded-xl py-2 px-3">刪除</button>
      <button id="edit-save" class="flex-1 bg-emerald-700 text-white rounded-xl py-2">儲存</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://soulchill-forms.qazmnbvgamil.workers.dev';
const CLASS_LABELS = {
  'tc-tue': '台中週二班',
  'tp-wed': '台北週三班',
  'tc-thu': '台中週四班',
};
const STATUS_LABEL = { active:'正常', pending_payment:'⏳待匯款', trial:'體驗', dropped:'退課' };

const $ = (id) => document.getElementById(id);
const q = new URLSearchParams(location.search);
let adminKey = q.get('k') || localStorage.getItem('attendance_admin_key') || '';
let currentClass = 'tc-tue';
let currentView = 'dash';
let dashData = null;
let adminStudents = [];

function fmtPct(n) {
  if (n === null || n === undefined) return '—';
  return n + '%';
}
function rateColor(n) {
  if (n === null) return '#9ca3af';
  if (n >= 80) return '#22c55e';
  if (n >= 60) return '#eab308';
  return '#ef4444';
}

async function loadDash() {
  $('dash-view').innerHTML = '<div class="text-center text-gray-500 py-12">載入中…</div>';
  try {
    const r = await fetch(`${API_BASE}/api/attendance/dashboard?k=${encodeURIComponent(adminKey)}`);
    const j = await r.json();
    if (!j.ok) {
      if (j.error === 'unauthorized') return showLogin('密碼錯誤');
      $('dash-view').innerHTML = '<p class="text-red-600">' + j.error + '</p>';
      return;
    }
    dashData = j;
    $('updated').textContent = '更新於 ' + j.updated;
    renderTabs();
    renderAlerts();
    renderDash();
  } catch (e) {
    $('dash-view').innerHTML = '<p class="text-red-600">網路錯誤：' + e.message + '</p>';
  }
}

function renderTabs() {
  const html = Object.entries(CLASS_LABELS).map(([code, label]) => {
    const d = dashData.classes[code];
    const cnt = d ? d.students.length : 0;
    const cls = code === currentClass ? 'tab-active' : 'tab-inactive';
    return `<button class="tab ${cls}" data-class="${code}">${label} <span class="opacity-70 text-xs">(${cnt})</span></button>`;
  }).join('');
  $('tabs').innerHTML = html;
  document.querySelectorAll('[data-class]').forEach(el => {
    el.onclick = () => {
      currentClass = el.dataset.class;
      renderTabs();
      if (currentView === 'dash') renderDash();
      else renderAdmin();
    };
  });
}

function renderAlerts() {
  const all = [];
  for (const [code, d] of Object.entries(dashData.classes)) {
    for (const s of d.students) {
      if (s.consecAbsent && d.totalSessions >= 2) {
        all.push({ class: CLASS_LABELS[code], name: s.name, kind: 'consec' });
      }
    }
  }
  if (all.length === 0) {
    $('alerts').innerHTML = '';
    return;
  }
  $('alerts').innerHTML = `
    <div class="bg-red-50 border border-red-200 rounded-xl p-3 text-sm">
      <strong class="text-red-700">⚠️ 連缺 2 週警示（${all.length}）：</strong>
      ${all.map(a => `<span class="inline-block mx-1">${a.class}・<b>${a.name}</b></span>`).join('；')}
    </div>`;
}

function renderDash() {
  const d = dashData.classes[currentClass];
  if (!d) {
    $('dash-view').innerHTML = '<p class="text-gray-500">尚無資料</p>';
    return;
  }
  const tw = d.thisWeek;
  const sessionsLine = d.sessionDates.length === 0
    ? '<span class="text-gray-500">尚未開始點名</span>'
    : `已上 <b>${d.totalSessions}</b> 堂｜最近：<b>${d.sessionDates[d.sessionDates.length-1]}</b>`;
  const twLine = tw
    ? `<div class="text-sm text-gray-600 mt-1">本週 (${tw.date})：出席 <b class="text-emerald-700">${tw.present}</b> / 請假 <b class="text-yellow-700">${tw.leave}</b> / 體驗 <b class="text-blue-700">${tw.trial}</b> / 未到 <b class="text-gray-700">${tw.absent}</b></div>`
    : '';

  const rows = d.students.map(s => {
    const rowCls = s.consecAbsent ? 'alert-row' : (s.rate !== null && s.rate < 60 ? 'warn-row' : '');
    const recent = s.recent.map(r => {
      const icon = { present:'🟢', leave:'🟡', trial:'🔵', absent:'⚪' }[r.status] || '⚪';
      return `<span title="${r.date} ${r.status}">${icon}</span>`;
    }).join(' ');
    const flagConsec = s.consecAbsent ? '<span class="text-red-600 text-xs ml-1">⚠️連缺</span>' : '';
    const planChip = s.plan ? `<span class="inline-block bg-gray-100 rounded px-1 text-xs">${s.plan}</span>` : '';
    const statusChip = s.status !== 'active' ? `<span class="inline-block bg-orange-100 text-orange-700 rounded px-1 text-xs">${STATUS_LABEL[s.status] || s.status}</span>` : '';
    return `
      <tr class="${rowCls}">
        <td>${s.name} ${flagConsec}</td>
        <td class="text-gray-500">${s.vdot || '—'}</td>
        <td>${planChip} ${statusChip}</td>
        <td>
          <div class="flex items-center gap-2">
            <div class="rate-bar w-20"><div class="rate-fill" style="width:${s.rate ?? 0}%; background:${rateColor(s.rate)}"></div></div>
            <span class="text-sm font-medium" style="color:${rateColor(s.rate)}">${fmtPct(s.rate)}</span>
          </div>
        </td>
        <td class="text-center text-sm">${s.present}</td>
        <td class="text-center text-sm text-yellow-700">${s.leave}</td>
        <td class="text-center text-sm text-gray-500">${s.absent}</td>
        <td class="text-center">${recent || '—'}</td>
      </tr>`;
  }).join('');

  $('dash-view').innerHTML = `
    <div class="bg-white rounded-2xl shadow p-4 mb-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold">${CLASS_LABELS[currentClass]}</h2>
        <a href="index.html?c=${currentClass}&k=${encodeURIComponent(adminKey)}" target="_blank"
           class="text-xs bg-emerald-50 text-emerald-700 rounded-lg px-3 py-1 hover:bg-emerald-100">
          開點名頁 →
        </a>
      </div>
      <p class="text-sm text-gray-600 mt-1">${sessionsLine}</p>
      ${twLine}
    </div>

    <div class="bg-white rounded-2xl shadow overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr>
            <th>學員</th><th>VDOT</th><th>標記</th>
            <th>出席率</th>
            <th class="text-center">到</th>
            <th class="text-center">假</th>
            <th class="text-center">缺</th>
            <th class="text-center">最近</th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="8" class="text-center text-gray-500 py-8">尚無學員</td></tr>'}</tbody>
      </table>
    </div>`;

}

async function loadAdmin() {
  $('admin-view').innerHTML = '<div class="text-center text-gray-500 py-12">載入中…</div>';
  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin/students?k=${encodeURIComponent(adminKey)}`);
    const j = await r.json();
    if (!j.ok) {
      if (j.error === 'unauthorized') return showLogin('密碼錯誤');
      $('admin-view').innerHTML = '<p class="text-red-600">' + j.error + '</p>';
      return;
    }
    adminStudents = j.students || [];
    renderAdmin();
  } catch (e) {
    $('admin-view').innerHTML = '<p class="text-red-600">網路錯誤：' + e.message + '</p>';
  }
}

function renderAdmin() {
  const list = adminStudents.filter(s => s.class_code === currentClass);
  const rows = list.map(s => `
    <tr>
      <td class="text-gray-400 text-xs">${s.sort_order}</td>
      <td>${s.name}</td>
      <td>${s.vdot || '—'}</td>
      <td>${s.plan || '—'}</td>
      <td>${STATUS_LABEL[s.status] || s.status}</td>
      <td class="text-gray-500 text-xs">${s.note || ''}</td>
      <td><button class="text-emerald-700 underline" data-edit="${s.id}">編輯</button></td>
    </tr>
  `).join('');

  $('admin-view').innerHTML = `
    <div class="bg-white rounded-2xl shadow p-4 mb-3">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold">${CLASS_LABELS[currentClass]}（${list.length}）</h2>
        <button id="add-btn" class="bg-emerald-700 text-white rounded-xl px-4 py-2 text-sm">+ 新增學員</button>
      </div>
    </div>
    <div class="bg-white rounded-2xl shadow overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr><th>排序</th><th>姓名</th><th>VDOT</th><th>方案</th><th>狀態</th><th>備註</th><th></th></tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="7" class="text-center text-gray-500 py-8">尚無學員</td></tr>'}</tbody>
      </table>
    </div>`;

  $('add-btn').onclick = () => openEdit(null);
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.onclick = () => openEdit(Number(el.dataset.edit));
  });
}

function openEdit(id) {
  const s = id ? adminStudents.find(x => x.id === id) : null;
  $('edit-title').textContent = s ? '編輯：' + s.name : '新增學員';
  $('edit-class').value = s?.class_code || currentClass;
  $('edit-name').value  = s?.name || '';
  $('edit-vdot').value  = s?.vdot || '';
  $('edit-plan').value  = s?.plan || '';
  $('edit-status').value= s?.status || 'active';
  $('edit-sort').value  = s?.sort_order ?? 999;
  $('edit-note').value  = s?.note || '';
  $('edit-modal').dataset.id = id || '';
  $('edit-delete').classList.toggle('hidden', !id);
  $('edit-modal').classList.remove('hidden');
}

async function saveEdit() {
  const id = $('edit-modal').dataset.id;
  const body = {
    class_code: $('edit-class').value,
    name:       $('edit-name').value.trim(),
    vdot:       $('edit-vdot').value.trim(),
    plan:       $('edit-plan').value.trim(),
    status:     $('edit-status').value,
    sort_order: Number($('edit-sort').value) || 999,
    note:       $('edit-note').value.trim(),
  };
  if (!body.name) return alert('姓名必填');
  if (id) body.id = Number(id);

  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin/student?k=${encodeURIComponent(adminKey)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.ok) return alert(j.error);
    $('edit-modal').classList.add('hidden');
    await loadAdmin();
  } catch (e) {
    alert('儲存失敗：' + e.message);
  }
}

async function deleteStudent() {
  const id = $('edit-modal').dataset.id;
  if (!id) return;
  if (!confirm('確定刪除？此操作會連同點名紀錄一併刪除。')) return;
  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin/student?k=${encodeURIComponent(adminKey)}&id=${id}`, {
      method: 'DELETE',
    });
    const j = await r.json();
    if (!j.ok) return alert(j.error);
    $('edit-modal').classList.add('hidden');
    await loadAdmin();
  } catch (e) {
    alert('刪除失敗：' + e.message);
  }
}

function showLogin(msg) {
  $('main').classList.add('hidden');
  $('login').classList.remove('hidden');
  if (msg) { $('k-error').textContent = msg; $('k-error').classList.remove('hidden'); }
  $('k-input').focus();
}

function init() {
  $('k-submit').onclick = () => {
    const v = $('k-input').value.trim();
    if (!v) return;
    adminKey = v;
    localStorage.setItem('attendance_admin_key', adminKey);
    $('login').classList.add('hidden');
    $('main').classList.remove('hidden');
    loadDash();
  };
  $('k-input').onkeydown = (e) => { if (e.key === 'Enter') $('k-submit').click(); };

  $('logout').onclick = () => {
    localStorage.removeItem('attendance_admin_key');
    location.reload();
  };
  $('reload').onclick = () => currentView === 'dash' ? loadDash() : loadAdmin();
  $('view-dash').onclick = () => {
    currentView = 'dash';
    $('view-dash').classList.replace('tab-inactive','tab-active');
    $('view-admin').classList.replace('tab-active','tab-inactive');
    $('dash-view').classList.remove('hidden');
    $('admin-view').classList.add('hidden');
    loadDash();
  };
  $('view-admin').onclick = () => {
    currentView = 'admin';
    $('view-admin').classList.replace('tab-inactive','tab-active');
    $('view-dash').classList.replace('tab-active','tab-inactive');
    $('admin-view').classList.remove('hidden');
    $('dash-view').classList.add('hidden');
    loadAdmin();
  };

  $('edit-cancel').onclick = () => $('edit-modal').classList.add('hidden');
  $('edit-save').onclick = saveEdit;
  $('edit-delete').onclick = deleteStudent;
  $('edit-modal').onclick = (e) => { if (e.target === $('edit-modal')) $('edit-modal').classList.add('hidden'); };

  if (!adminKey) {
    showLogin();
  } else {
    $('main').classList.remove('hidden');
    loadDash();
  }
}

init();
</script>
</body>
</html>
