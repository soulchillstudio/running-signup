<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>跑班點名</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; font-size: 18px; }
  .tab { padding:10px 18px; border-radius:9999px; cursor:pointer; font-weight:500; font-size:18px; }
  .tab-active   { background:#0f3e36; color:#fff; }
  .tab-inactive { background:#e5e7eb; color:#4b5563; }
  .stcard { transition: background-color .15s, border-color .15s; -webkit-tap-highlight-color: transparent; user-select:none; }
  .stcard:active { transform: scale(0.98); }
  .st-present  { background:#dcfce7; border-color:#22c55e; color:#14532d; }
  .st-absent   { background:#fef9c3; border-color:#eab308; color:#713f12; }
  .st-unmarked { background:#fff;    border-color:#e5e7eb; color:#9ca3af; }
  th, td { padding: 10px 12px; font-size: 17px; }
  th { background:#f9fafb; text-align:left; font-weight:600; color:#4b5563; }
  tbody tr { border-top: 1px solid #f3f4f6; }
  .edit-btn { padding: 4px 8px; border-radius: 6px; background: rgba(0,0,0,.05); }
  .edit-btn:active { background: rgba(0,0,0,.1); }
</style>
</head>
<body class="bg-stone-50 text-gray-900">

<div class="max-w-3xl mx-auto px-3 py-4 pb-24">

  <!-- PIN 輸入 (助教) -->
  <div id="pin-form" class="hidden bg-white rounded-2xl shadow p-6 mt-12">
    <h2 class="text-2xl font-semibold mb-1">輸入助教 PIN</h2>
    <p class="text-lg text-gray-500 mb-1">班別：<span id="pin-class-label" class="font-medium text-gray-800"></span></p>
    <p class="text-lg text-gray-500 mb-4">本班 PIN 由 Jesse 提供</p>
    <input id="pin-input" type="text" inputmode="numeric" autocomplete="off"
      class="w-full text-4xl tracking-widest text-center border rounded-xl py-3 mb-3" placeholder="••••">
    <button id="pin-submit" class="w-full bg-emerald-700 text-white rounded-xl py-3 font-medium">進入</button>
    <p id="pin-error" class="text-red-600 text-lg mt-3 hidden"></p>
  </div>

  <!-- 密碼登入 (Jesse) -->
  <div id="k-form" class="hidden max-w-sm mx-auto bg-white rounded-2xl shadow p-6 mt-12">
    <h2 class="text-2xl font-semibold mb-1">Jesse 管理密碼</h2>
    <input id="k-input" type="password" class="w-full text-2xl border rounded-xl py-3 px-3 mb-3" placeholder="ADMIN_KEY">
    <button id="k-submit" class="w-full bg-emerald-700 text-white rounded-xl py-3 font-medium">進入</button>
    <p id="k-error" class="text-red-600 text-lg mt-3 hidden"></p>
  </div>

  <!-- 主畫面 -->
  <div id="main" class="hidden">

    <!-- 班別 tabs -->
    <div id="tabs" class="flex gap-2 mb-3 flex-wrap"></div>

    <!-- 控制列 -->
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <select id="date-input" class="border rounded-lg px-2 py-2 text-lg flex-1 min-w-0"></select>
      <button id="reload-btn" class="text-lg bg-white border rounded-lg px-3 py-2">↻</button>
      <button id="logout-btn" class="hidden text-base text-gray-500 underline">登出</button>
    </div>

    <!-- 今日統計 + 全勤摘要 -->
    <div id="stats" class="grid grid-cols-3 gap-2 mb-4">
      <div class="bg-emerald-50 rounded-xl py-2 text-center">
        <div class="text-base text-emerald-700">今日出席</div>
        <div class="text-3xl font-bold text-emerald-800"><span id="stat-present">0</span> / <span id="stat-total" class="text-emerald-600">0</span></div>
      </div>
      <div class="bg-yellow-50 rounded-xl py-2 text-center">
        <div class="text-base text-yellow-700">今日請假</div>
        <div class="text-3xl font-bold text-yellow-800" id="stat-absent">0</div>
      </div>
      <div class="bg-blue-50 rounded-xl py-2 text-center">
        <div class="text-base text-blue-700">本期全勤 (<span id="stat-sessions">0</span> 堂)</div>
        <div class="text-3xl font-bold text-blue-800" id="stat-perfect">0</div>
      </div>
    </div>

    <p class="text-base text-gray-500 mb-2">
      預設 <span class="inline-block px-2 py-0.5 rounded border st-unmarked">未點名</span>，點一下變
      <span class="inline-block px-2 py-0.5 rounded border st-present">出席</span>，再一下變
      <span class="inline-block px-2 py-0.5 rounded border st-absent">請假</span>，再點回未點名。
    </p>

    <!-- 學員清單 -->
    <div id="groups"></div>

    <p id="save-toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-lg px-4 py-2 rounded-full z-40"></p>
  </div>

</div>


<script>
const API_BASE = 'https://soulchill-forms.qazmnbvgamil.workers.dev';
const CLASS_LABELS = {
  'tc-tue': '台中週二班',
  'tp-wed': '台北週三班',
  'tc-thu': '台中週四班',
};
const CLASS_DOW = { 'tc-tue': 2, 'tp-wed': 3, 'tc-thu': 4 };  // 0=日 1=一 2=二 ...
const SEASON_START = '2026-06-02';      // W01 = 6/2 (週二) 開始
const TOTAL_WEEKS = 12;
const $ = (id) => document.getElementById(id);

const q = new URLSearchParams(location.search);
let adminKey  = q.get('k') || localStorage.getItem('att_admin_key') || '';
let pinClass  = q.get('c') || '';
let pinValue  = q.get('p') || (pinClass ? localStorage.getItem('att_pin_' + pinClass) || '' : '');
const isAdmin = () => !!adminKey;

let currentClass = pinClass && CLASS_LABELS[pinClass] ? pinClass : 'tc-tue';
let currentDate  = '';
let dashData = null;            // 全班儀表 + 學員 attendance
let adminStudents = [];

// ---- 工具 ----
function tpeNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
}
function fmtISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function classSessionDates(classCode) {
  // 由 SEASON_START 起，往後找該 class 的 12 個 dow 日期
  const dow = CLASS_DOW[classCode];
  const start = new Date(SEASON_START + 'T00:00:00');
  // 先找到 SEASON_START 起第一個該 dow 的日期
  let d = new Date(start);
  while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
  const out = [];
  for (let i = 0; i < TOTAL_WEEKS; i++) {
    out.push(fmtISO(d));
    d.setDate(d.getDate() + 7);
  }
  return out;
}
function pickDefaultDate(classCode) {
  const today = fmtISO(tpeNow());
  const dates = classSessionDates(classCode);
  // 今天若是該班 dow → 用今天；否則用「最近的下一堂」或「最後一堂」
  if (dates.includes(today)) return today;
  const future = dates.filter(d => d >= today);
  if (future.length > 0) return future[0];
  return dates[dates.length - 1];
}
function toast(msg, ms=1500) {
  const t = $('save-toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.add('hidden'), ms);
}

// ---- 載入該班 dashboard ----
async function loadClass() {
  if (!CLASS_LABELS[currentClass]) return;
  // 助教 PIN 模式不能切到別班
  if (!isAdmin() && currentClass !== pinClass) {
    alert('助教只能進入自己班別的點名頁');
    currentClass = pinClass;
    renderTabs();
    return;
  }

  $('groups').innerHTML = '<div class="text-center text-gray-400 py-12">載入中…</div>';

  const params = new URLSearchParams({ c: currentClass, date: currentDate });
  if (isAdmin()) params.set('k', adminKey);
  else params.set('p', pinValue);

  try {
    const r = await fetch(`${API_BASE}/api/attendance/class?${params}`);
    const j = await r.json();
    if (!j.ok) {
      if (j.error === 'unauthorized') {
        // 清掉可能卡住的舊 PIN，讓助教重新輸入
        if (!isAdmin() && pinClass) {
          localStorage.removeItem('att_pin_' + pinClass);
          pinValue = '';
        }
        showPinForm('PIN 不正確，請重新輸入');
        return;
      }
      $('groups').innerHTML = '<p class="text-red-600">' + j.error + '</p>';
      return;
    }
    dashData = j;
    renderCards();
    await loadAllAttendance();
  } catch (e) {
    $('groups').innerHTML = '<p class="text-red-600">網路錯誤：' + e.message + '</p>';
  }
}

// 拉本期所有 attendance（為了算全勤、出席次數）
// 只有 admin 用 dashboard endpoint；助教不用全勤摘要
async function loadAllAttendance() {
  if (!isAdmin()) {
    // 助教看不到全勤摘要
    $('stat-sessions').textContent = '—';
    $('stat-perfect').textContent = '—';
    updateTodayStats();
    return;
  }
  try {
    const r = await fetch(`${API_BASE}/api/attendance/dashboard?k=${encodeURIComponent(adminKey)}`);
    const j = await r.json();
    if (!j.ok) return;
    const c = j.classes[currentClass];
    if (!c) return;
    $('stat-sessions').textContent = c.totalSessions || 0;
    // 全勤 = present 次數 == totalSessions（且 totalSessions > 0）
    const perfectCount = c.totalSessions > 0
      ? c.students.filter(s => s.present === c.totalSessions).length
      : 0;
    $('stat-perfect').textContent = perfectCount;
    // 把每位學員的 present 數寫進卡片
    const presentMap = {};
    for (const s of c.students) presentMap[s.id] = s.present;
    document.querySelectorAll('[data-attend-count]').forEach(el => {
      const sid = Number(el.dataset.sid);
      const n = presentMap[sid] || 0;
      const total = c.totalSessions || 0;
      el.textContent = total > 0 ? `${n}/${total}` : '';
      if (total > 0 && n === total) el.classList.add('text-emerald-700', 'font-bold');
    });
  } catch (e) { /* ignore */ }
}

function renderCards() {
  if (!dashData) return;
  const students = dashData.students || [];

  // 按 VDOT 分組
  const groups = {};
  for (const s of students) {
    const g = s.vdot || '—';
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  }
  const orderKey = (k) => {
    if (k === '新') return -1;
    if (k === '—' || k === '待補') return -999;
    const m = String(k).match(/^(\d+)/);
    return m ? parseInt(m[1]) : -500;
  };
  const sortedKeys = Object.keys(groups).sort((a, b) => orderKey(b) - orderKey(a));

  let html = '';
  for (const k of sortedKeys) {
    const list = groups[k];
    html += `
      <div class="mb-4">
        <h3 class="text-lg font-semibold text-gray-600 mb-2">VDOT ${k} <span class="text-gray-400 font-normal">(${list.length})</span></h3>
        <div class="grid grid-cols-1 gap-2">
          ${list.map(renderCard).join('')}
        </div>
      </div>`;
  }
  $('groups').innerHTML = html;
  // 卡片 toggle
  document.querySelectorAll('.stcard[data-sid]').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('[data-edit-nick]')) return;  // 點 ✎ 不觸發 toggle
      onToggle(el);
    };
  });
  // ✎ 編輯暱稱
  document.querySelectorAll('[data-edit-nick]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      editNickname(Number(el.dataset.editNick));
    };
  });
  updateTodayStats();
}

const LABEL = { present:'出席', absent:'請假', unmarked:'未點名' };

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderCard(s) {
  const st = (s.att_status === 'present' || s.att_status === 'absent') ? s.att_status : 'unmarked';
  const stClass = 'st-' + st;
  const planChip = s.plan ? `<span class="text-base text-gray-500">${escapeHtml(s.plan)}</span>` : '';
  // 名字顯示：有 nickname → 暱稱 (本名 小灰字)；無 → 本名
  const nameHtml = s.nickname
    ? `<span class="font-bold truncate">${escapeHtml(s.nickname)}</span>
       <span class="text-base text-gray-500 truncate">(${escapeHtml(s.name)})</span>`
    : `<span class="font-medium truncate">${escapeHtml(s.name)}</span>`;
  return `
    <div class="stcard border-2 ${stClass} rounded-xl px-4 py-4 flex items-center justify-between gap-2 cursor-pointer"
         data-sid="${s.id}" data-status="${st}">
      <div class="flex items-center gap-2 min-w-0 flex-1">
        ${nameHtml}
        <button class="edit-btn text-base text-gray-500 shrink-0" data-edit-nick="${s.id}" title="編輯暱稱">✎</button>
        ${planChip}
      </div>
      <div class="flex items-center gap-3 shrink-0 text-2xl">
        <span data-attend-count data-sid="${s.id}" class="text-base text-gray-500"></span>
        <span data-status-label class="font-bold">${LABEL[st]}</span>
      </div>
    </div>`;
}

async function editNickname(sid) {
  const s = dashData?.students.find(x => x.id === sid);
  if (!s) return;
  const cur = s.nickname || '';
  const next = prompt(`為「${s.name}」設定暱稱（跑跑名 / 代號）\n留空 = 清除暱稱`, cur);
  if (next === null) return;  // 取消
  const trimmed = next.trim();
  if (trimmed === cur) return; // 無變化

  const body = { c: currentClass, student_id: sid, nickname: trimmed };
  if (isAdmin()) body.k = adminKey;
  else body.p = pinValue;

  try {
    const r = await fetch(`${API_BASE}/api/attendance/nickname`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    s.nickname = trimmed || null;
    renderCards();
    loadAllAttendance();
    toast('已儲存暱稱');
  } catch (e) {
    toast('儲存失敗：' + e.message, 2500);
  }
}

function nextStatus(cur) {
  // unmarked → present → absent → unmarked
  return cur === 'unmarked' ? 'present'
       : cur === 'present'  ? 'absent'
       : 'unmarked';
}

async function onToggle(el) {
  const sid = Number(el.dataset.sid);
  const cur = el.dataset.status;
  const next = nextStatus(cur);

  // optimistic
  el.dataset.status = next;
  el.classList.remove('st-present', 'st-absent', 'st-unmarked');
  el.classList.add('st-' + next);
  el.querySelector('[data-status-label]').textContent = LABEL[next];
  const s = dashData.students.find(x => x.id === sid);
  if (s) s.att_status = next === 'unmarked' ? null : next;
  updateTodayStats();

  // unmarked = 送 status='clear' 讓 worker DELETE 記錄
  const apiStatus = next === 'unmarked' ? 'clear' : next;
  const body = { c: currentClass, date: currentDate, student_id: sid, status: apiStatus };
  if (isAdmin()) body.k = adminKey;
  else body.p = pinValue;

  try {
    const r = await fetch(`${API_BASE}/api/attendance/mark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    loadAllAttendance();
  } catch (e) {
    toast('儲存失敗：' + e.message, 2500);
    el.dataset.status = cur;
    el.classList.remove('st-present', 'st-absent', 'st-unmarked');
    el.classList.add('st-' + cur);
    el.querySelector('[data-status-label]').textContent = LABEL[cur];
    if (s) s.att_status = cur === 'unmarked' ? null : cur;
    updateTodayStats();
  }
}

function updateTodayStats() {
  if (!dashData) return;
  const all = dashData.students || [];
  let p = 0, a = 0;
  for (const s of all) {
    if (s.att_status === 'present') p++;
    else if (s.att_status === 'absent') a++;
  }
  $('stat-present').textContent = p;
  $('stat-absent').textContent = a;
  $('stat-total').textContent = all.length;
}

// ---- Tabs + 日期 picker ----
function renderTabs() {
  const html = Object.entries(CLASS_LABELS).map(([code, label]) => {
    const cls = code === currentClass ? 'tab-active' : 'tab-inactive';
    // 助教 mode 只能顯示自己的班
    if (!isAdmin() && code !== pinClass) return '';
    return `<button class="tab ${cls}" data-class="${code}">${label}</button>`;
  }).join('');
  $('tabs').innerHTML = html;
  document.querySelectorAll('[data-class]').forEach(el => {
    el.onclick = () => {
      currentClass = el.dataset.class;
      renderTabs();
      renderDateOptions();
      loadClass();
    };
  });
}

function renderDateOptions() {
  const dates = classSessionDates(currentClass);
  const today = fmtISO(tpeNow());
  const sel = $('date-input');
  sel.innerHTML = dates.map((d, i) => {
    const dt = new Date(d + 'T00:00:00');
    const m = dt.getMonth() + 1, dd = dt.getDate();
    const dowLabel = ['日','一','二','三','四','五','六'][dt.getDay()];
    const week = 'W' + String(i+1).padStart(2,'0');
    const past = d < today ? ' (已過)' : '';
    const tag = d === today ? ' ← 今天' : '';
    return `<option value="${d}" ${d === currentDate ? 'selected' : ''}>${week} · ${m}/${dd}(週${dowLabel})${tag}${past}</option>`;
  }).join('');

  if (!dates.includes(currentDate)) {
    currentDate = pickDefaultDate(currentClass);
    sel.value = currentDate;
  }
}

// ---- 登入流程 ----
function showPinForm(errMsg) {
  $('main').classList.add('hidden');
  $('k-form').classList.add('hidden');
  $('pin-form').classList.remove('hidden');
  $('pin-class-label').textContent = CLASS_LABELS[pinClass] || pinClass || '(未指定 — URL 缺 ?c=)';
  if (errMsg) {
    $('pin-error').textContent = errMsg;
    $('pin-error').classList.remove('hidden');
  } else {
    $('pin-error').classList.add('hidden');
  }
  $('pin-input').value = '';
  $('pin-input').focus();
}
function showKForm() {
  $('main').classList.add('hidden');
  $('pin-form').classList.add('hidden');
  $('k-form').classList.remove('hidden');
  $('k-input').focus();
}
function enterMain() {
  $('pin-form').classList.add('hidden');
  $('k-form').classList.add('hidden');
  $('main').classList.remove('hidden');
  $('logout-btn').classList.toggle('hidden', !isAdmin());
  renderTabs();
  renderDateOptions();
  loadClass();
}

function init() {
  // 入口判斷：有 c=tc-tue 就是助教模式（要 PIN），否則是 Jesse 模式（要 ADMIN_KEY）
  if (pinClass && CLASS_LABELS[pinClass] && !adminKey) {
    if (!pinValue) {
      showPinForm();
    } else {
      currentClass = pinClass;
      currentDate = pickDefaultDate(currentClass);
      enterMain();
    }
  } else {
    // Jesse 模式
    if (!adminKey) {
      showKForm();
    } else {
      currentDate = pickDefaultDate(currentClass);
      enterMain();
    }
  }

  $('pin-submit').onclick = async () => {
    const v = $('pin-input').value.trim();
    if (!v) return;
    if (!pinClass) {
      $('pin-error').textContent = '網址沒有班別參數，請用 Jesse 提供的完整連結（含 ?c=tc-tue 等）';
      $('pin-error').classList.remove('hidden');
      return;
    }
    $('pin-error').classList.add('hidden');
    $('pin-submit').textContent = '驗證中…';
    $('pin-submit').disabled = true;
    pinValue = v;
    localStorage.setItem('att_pin_' + pinClass, pinValue);
    currentClass = pinClass;
    currentDate = pickDefaultDate(currentClass);
    try {
      await new Promise(r => setTimeout(r, 10));
      enterMain();
    } finally {
      $('pin-submit').textContent = '進入';
      $('pin-submit').disabled = false;
    }
  };
  $('pin-input').onkeydown = (e) => { if (e.key === 'Enter') $('pin-submit').click(); };

  $('k-submit').onclick = () => {
    const v = $('k-input').value.trim();
    if (!v) return;
    adminKey = v;
    localStorage.setItem('att_admin_key', adminKey);
    currentDate = pickDefaultDate(currentClass);
    enterMain();
  };
  $('k-input').onkeydown = (e) => { if (e.key === 'Enter') $('k-submit').click(); };

  $('logout-btn').onclick = () => {
    localStorage.removeItem('att_admin_key');
    location.reload();
  };
  $('reload-btn').onclick = loadClass;
  $('date-input').onchange = () => { currentDate = $('date-input').value; loadClass(); };
}

init();
</script>
</body>
</html>
