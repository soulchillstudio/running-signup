<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>跑班點名</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif; }
  .tab { padding:8px 14px; border-radius:9999px; cursor:pointer; font-weight:500; font-size:14px; }
  .tab-active   { background:#0f3e36; color:#fff; }
  .tab-inactive { background:#e5e7eb; color:#4b5563; }
  .stcard { transition: background-color .15s, border-color .15s; -webkit-tap-highlight-color: transparent; user-select:none; }
  .stcard:active { transform: scale(0.98); }
  .st-present { background:#dcfce7; border-color:#22c55e; color:#14532d; }
  .st-absent  { background:#fef9c3; border-color:#eab308; color:#713f12; }
  th, td { padding: 6px 8px; font-size: 13px; }
  th { background:#f9fafb; text-align:left; font-weight:600; color:#4b5563; }
  tbody tr { border-top: 1px solid #f3f4f6; }
</style>
</head>
<body class="bg-stone-50 text-gray-900">

<div class="max-w-3xl mx-auto px-3 py-4 pb-24">

  <!-- PIN 輸入 (助教) -->
  <div id="pin-form" class="hidden bg-white rounded-2xl shadow p-6 mt-12">
    <h2 class="text-lg font-semibold mb-1">輸入助教 PIN</h2>
    <p class="text-sm text-gray-500 mb-4">本班 PIN 由 Jesse 提供</p>
    <input id="pin-input" type="text" inputmode="numeric" autocomplete="off"
      class="w-full text-2xl tracking-widest text-center border rounded-xl py-3 mb-3" placeholder="••••">
    <button id="pin-submit" class="w-full bg-emerald-700 text-white rounded-xl py-3 font-medium">進入</button>
    <p id="pin-error" class="text-red-600 text-sm mt-3 hidden"></p>
  </div>

  <!-- 密碼登入 (Jesse) -->
  <div id="k-form" class="hidden max-w-sm mx-auto bg-white rounded-2xl shadow p-6 mt-12">
    <h2 class="text-lg font-semibold mb-1">Jesse 管理密碼</h2>
    <input id="k-input" type="password" class="w-full text-lg border rounded-xl py-3 px-3 mb-3" placeholder="ADMIN_KEY">
    <button id="k-submit" class="w-full bg-emerald-700 text-white rounded-xl py-3 font-medium">進入</button>
    <p id="k-error" class="text-red-600 text-sm mt-3 hidden"></p>
  </div>

  <!-- 主畫面 -->
  <div id="main" class="hidden">

    <!-- 班別 tabs -->
    <div id="tabs" class="flex gap-2 mb-3 flex-wrap"></div>

    <!-- 控制列 -->
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <select id="date-input" class="border rounded-lg px-2 py-2 text-sm flex-1 min-w-0"></select>
      <button id="manage-btn" class="hidden text-sm bg-white border rounded-lg px-3 py-2">⚙️ 管理</button>
      <button id="reload-btn" class="text-sm bg-white border rounded-lg px-3 py-2">↻</button>
      <button id="logout-btn" class="hidden text-xs text-gray-500 underline">登出</button>
    </div>

    <!-- 今日統計 + 全勤摘要 -->
    <div id="stats" class="grid grid-cols-3 gap-2 mb-4">
      <div class="bg-emerald-50 rounded-xl py-2 text-center">
        <div class="text-xs text-emerald-700">今日出席</div>
        <div class="text-xl font-bold text-emerald-800"><span id="stat-present">0</span> / <span id="stat-total" class="text-emerald-600">0</span></div>
      </div>
      <div class="bg-yellow-50 rounded-xl py-2 text-center">
        <div class="text-xs text-yellow-700">今日請假</div>
        <div class="text-xl font-bold text-yellow-800" id="stat-absent">0</div>
      </div>
      <div class="bg-blue-50 rounded-xl py-2 text-center">
        <div class="text-xs text-blue-700">本期全勤 (<span id="stat-sessions">0</span> 堂)</div>
        <div class="text-xl font-bold text-blue-800" id="stat-perfect">0</div>
      </div>
    </div>

    <p class="text-xs text-gray-500 mb-2">
      <span class="inline-block px-2 py-0.5 rounded border st-present">出席</span> 預設綠色 ← 點一下 →
      <span class="inline-block px-2 py-0.5 rounded border st-absent">請假</span> 黃色（不論是否事先申請，沒到都算）
    </p>

    <!-- 學員清單 -->
    <div id="groups"></div>

    <p id="save-toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 bg-black/80 text-white text-sm px-4 py-2 rounded-full z-40"></p>
  </div>

</div>

<!-- 管理 modal (Jesse only) -->
<div id="manage-modal" class="hidden fixed inset-0 bg-black/50 z-50 overflow-y-auto p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-3xl mx-auto my-6 p-5">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-lg font-semibold">學員管理（<span id="manage-class-label"></span>）</h3>
      <button id="manage-close" class="text-gray-500 text-2xl leading-none">×</button>
    </div>
    <button id="manage-add" class="mb-3 bg-emerald-700 text-white rounded-xl px-3 py-2 text-sm">+ 新增學員</button>
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
          <tr><th>排序</th><th>姓名</th><th>VDOT</th><th>方案</th><th>狀態</th><th>備註</th><th></th></tr>
        </thead>
        <tbody id="manage-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 學員編輯 modal -->
<div id="edit-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
    <h3 id="edit-title" class="text-lg font-semibold mb-4">編輯學員</h3>
    <div class="space-y-3">
      <div>
        <label class="text-xs text-gray-600">班別</label>
        <select id="edit-class" class="w-full border rounded-lg py-2 px-2">
          <option value="tc-tue">台中週二班</option>
          <option value="tp-wed">台北週三班</option>
          <option value="tc-thu">台中週四班</option>
        </select>
      </div>
      <div>
        <label class="text-xs text-gray-600">姓名（全名）</label>
        <input id="edit-name" type="text" class="w-full border rounded-lg py-2 px-2">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-600">VDOT</label>
          <input id="edit-vdot" type="text" class="w-full border rounded-lg py-2 px-2" placeholder="39 / 新">
        </div>
        <div>
          <label class="text-xs text-gray-600">方案</label>
          <input id="edit-plan" type="text" class="w-full border rounded-lg py-2 px-2" placeholder="A/B/C/D/E/F">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-xs text-gray-600">狀態</label>
          <select id="edit-status" class="w-full border rounded-lg py-2 px-2">
            <option value="active">active 正常</option>
            <option value="pending_payment">pending_payment 待匯款</option>
            <option value="trial">trial 體驗</option>
            <option value="dropped">dropped 退課（不顯示）</option>
          </select>
        </div>
        <div>
          <label class="text-xs text-gray-600">排序 (小→前)</label>
          <input id="edit-sort" type="number" class="w-full border rounded-lg py-2 px-2" value="999">
        </div>
      </div>
      <div>
        <label class="text-xs text-gray-600">備註</label>
        <textarea id="edit-note" rows="2" class="w-full border rounded-lg py-2 px-2"></textarea>
      </div>
    </div>
    <div class="flex gap-2 mt-5">
      <button id="edit-cancel" class="flex-1 bg-gray-200 rounded-xl py-2">取消</button>
      <button id="edit-delete" class="hidden bg-red-100 text-red-700 rounded-xl py-2 px-3">刪除</button>
      <button id="edit-save" class="flex-1 bg-emerald-700 text-white rounded-xl py-2">儲存</button>
    </div>
  </div>
</div>

<script>
const API_BASE = 'https://soulchill-forms.qazmnbvgamil.workers.dev';
const CLASS_LABELS = {
  'tc-tue': '台中週二班',
  'tp-wed': '台北週三班',
  'tc-thu': '台中週四班',
};
const CLASS_DOW = { 'tc-tue': 2, 'tp-wed': 3, 'tc-thu': 4 };  // 0=日 1=一 2=二 ...
const SEASON_START = '2026-06-02';      // W01 = 6/2 (週二) 開始
const TOTAL_WEEKS = 12;
const $ = (id) => document.getElementById(id);

const q = new URLSearchParams(location.search);
let adminKey  = q.get('k') || localStorage.getItem('att_admin_key') || '';
let pinClass  = q.get('c') || '';
let pinValue  = q.get('p') || (pinClass ? localStorage.getItem('att_pin_' + pinClass) || '' : '');
const isAdmin = () => !!adminKey;

let currentClass = pinClass && CLASS_LABELS[pinClass] ? pinClass : 'tc-tue';
let currentDate  = '';
let dashData = null;            // 全班儀表 + 學員 attendance
let adminStudents = [];

// ---- 工具 ----
function tpeNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
}
function fmtISO(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function classSessionDates(classCode) {
  // 由 SEASON_START 起，往後找該 class 的 12 個 dow 日期
  const dow = CLASS_DOW[classCode];
  const start = new Date(SEASON_START + 'T00:00:00');
  // 先找到 SEASON_START 起第一個該 dow 的日期
  let d = new Date(start);
  while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
  const out = [];
  for (let i = 0; i < TOTAL_WEEKS; i++) {
    out.push(fmtISO(d));
    d.setDate(d.getDate() + 7);
  }
  return out;
}
function pickDefaultDate(classCode) {
  const today = fmtISO(tpeNow());
  const dates = classSessionDates(classCode);
  // 今天若是該班 dow → 用今天；否則用「最近的下一堂」或「最後一堂」
  if (dates.includes(today)) return today;
  const future = dates.filter(d => d >= today);
  if (future.length > 0) return future[0];
  return dates[dates.length - 1];
}
function toast(msg, ms=1500) {
  const t = $('save-toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.add('hidden'), ms);
}

// ---- 載入該班 dashboard ----
async function loadClass() {
  if (!CLASS_LABELS[currentClass]) return;
  // 助教 PIN 模式不能切到別班
  if (!isAdmin() && currentClass !== pinClass) {
    alert('助教只能進入自己班別的點名頁');
    currentClass = pinClass;
    renderTabs();
    return;
  }

  $('groups').innerHTML = '<div class="text-center text-gray-400 py-12">載入中…</div>';

  const params = new URLSearchParams({ c: currentClass, date: currentDate });
  if (isAdmin()) params.set('k', adminKey);
  else params.set('p', pinValue);

  try {
    const r = await fetch(`${API_BASE}/api/attendance/class?${params}`);
    const j = await r.json();
    if (!j.ok) {
      if (j.error === 'unauthorized') {
        showPinForm();
        return;
      }
      $('groups').innerHTML = '<p class="text-red-600">' + j.error + '</p>';
      return;
    }
    dashData = j;
    renderCards();
    await loadAllAttendance();
  } catch (e) {
    $('groups').innerHTML = '<p class="text-red-600">網路錯誤：' + e.message + '</p>';
  }
}

// 拉本期所有 attendance（為了算全勤、出席次數）
// 只有 admin 用 dashboard endpoint；助教不用全勤摘要
async function loadAllAttendance() {
  if (!isAdmin()) {
    // 助教看不到全勤摘要
    $('stat-sessions').textContent = '—';
    $('stat-perfect').textContent = '—';
    updateTodayStats();
    return;
  }
  try {
    const r = await fetch(`${API_BASE}/api/attendance/dashboard?k=${encodeURIComponent(adminKey)}`);
    const j = await r.json();
    if (!j.ok) return;
    const c = j.classes[currentClass];
    if (!c) return;
    $('stat-sessions').textContent = c.totalSessions || 0;
    // 全勤 = present 次數 == totalSessions（且 totalSessions > 0）
    const perfectCount = c.totalSessions > 0
      ? c.students.filter(s => s.present === c.totalSessions).length
      : 0;
    $('stat-perfect').textContent = perfectCount;
    // 把每位學員的 present 數寫進卡片
    const presentMap = {};
    for (const s of c.students) presentMap[s.id] = s.present;
    document.querySelectorAll('[data-attend-count]').forEach(el => {
      const sid = Number(el.dataset.sid);
      const n = presentMap[sid] || 0;
      const total = c.totalSessions || 0;
      el.textContent = total > 0 ? `${n}/${total}` : '';
      if (total > 0 && n === total) el.classList.add('text-emerald-700', 'font-bold');
    });
  } catch (e) { /* ignore */ }
}

function renderCards() {
  if (!dashData) return;
  const students = dashData.students || [];

  // 按 VDOT 分組
  const groups = {};
  for (const s of students) {
    const g = s.vdot || '—';
    if (!groups[g]) groups[g] = [];
    groups[g].push(s);
  }
  const orderKey = (k) => {
    if (k === '新') return -1;
    if (k === '—' || k === '待補') return -999;
    const m = String(k).match(/^(\d+)/);
    return m ? parseInt(m[1]) : -500;
  };
  const sortedKeys = Object.keys(groups).sort((a, b) => orderKey(b) - orderKey(a));

  let html = '';
  for (const k of sortedKeys) {
    const list = groups[k];
    html += `
      <div class="mb-4">
        <h3 class="text-sm font-semibold text-gray-600 mb-2">VDOT ${k} <span class="text-gray-400 font-normal">(${list.length})</span></h3>
        <div class="grid grid-cols-1 gap-2">
          ${list.map(renderCard).join('')}
        </div>
      </div>`;
  }
  $('groups').innerHTML = html;
  // 預設沒記錄 = 出席（綠色） — 二態邏輯
  document.querySelectorAll('[data-sid]').forEach(el => {
    el.onclick = () => onToggle(el);
  });
  updateTodayStats();
}

function renderCard(s) {
  // 二態：present (預設) / absent
  // 若 DB 有記錄 absent，顯示 absent；否則 present
  const st = s.att_status === 'absent' ? 'absent' : 'present';
  const stClass = 'st-' + st;
  const planChip = s.plan ? `<span class="text-xs text-gray-500">${s.plan}</span>` : '';
  return `
    <div class="stcard border-2 ${stClass} rounded-xl px-3 py-3 flex items-center justify-between gap-2 cursor-pointer"
         data-sid="${s.id}" data-status="${st}">
      <div class="flex items-center gap-2 min-w-0">
        <span class="font-medium truncate">${s.name}</span>
        ${planChip}
      </div>
      <div class="flex items-center gap-3 shrink-0 text-sm">
        <span data-attend-count data-sid="${s.id}" class="text-xs text-gray-500"></span>
        <span data-status-label class="font-bold">${st === 'present' ? '出席' : '請假'}</span>
      </div>
    </div>`;
}

async function onToggle(el) {
  const sid = Number(el.dataset.sid);
  const cur = el.dataset.status;
  const next = cur === 'present' ? 'absent' : 'present';

  // optimistic
  el.dataset.status = next;
  el.classList.remove('st-present', 'st-absent');
  el.classList.add('st-' + next);
  el.querySelector('[data-status-label]').textContent = next === 'present' ? '出席' : '請假';
  // local
  const s = dashData.students.find(x => x.id === sid);
  if (s) s.att_status = next;
  updateTodayStats();

  const body = { c: currentClass, date: currentDate, student_id: sid, status: next };
  if (isAdmin()) body.k = adminKey;
  else body.p = pinValue;

  try {
    const r = await fetch(`${API_BASE}/api/attendance/mark`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error);
    // 重新拉 dashboard 更新 attend-count
    loadAllAttendance();
  } catch (e) {
    toast('儲存失敗：' + e.message, 2500);
    el.dataset.status = cur;
    el.classList.remove('st-present', 'st-absent');
    el.classList.add('st-' + cur);
    el.querySelector('[data-status-label]').textContent = cur === 'present' ? '出席' : '請假';
    if (s) s.att_status = cur;
    updateTodayStats();
  }
}

function updateTodayStats() {
  if (!dashData) return;
  const all = dashData.students || [];
  let p = 0, a = 0;
  for (const s of all) {
    if (s.att_status === 'absent') a++; else p++;
  }
  $('stat-present').textContent = p;
  $('stat-absent').textContent = a;
  $('stat-total').textContent = all.length;
}

// ---- Tabs + 日期 picker ----
function renderTabs() {
  const html = Object.entries(CLASS_LABELS).map(([code, label]) => {
    const cls = code === currentClass ? 'tab-active' : 'tab-inactive';
    // 助教 mode 只能顯示自己的班
    if (!isAdmin() && code !== pinClass) return '';
    return `<button class="tab ${cls}" data-class="${code}">${label}</button>`;
  }).join('');
  $('tabs').innerHTML = html;
  document.querySelectorAll('[data-class]').forEach(el => {
    el.onclick = () => {
      currentClass = el.dataset.class;
      renderTabs();
      renderDateOptions();
      loadClass();
    };
  });
}

function renderDateOptions() {
  const dates = classSessionDates(currentClass);
  const today = fmtISO(tpeNow());
  const sel = $('date-input');
  sel.innerHTML = dates.map((d, i) => {
    const dt = new Date(d + 'T00:00:00');
    const m = dt.getMonth() + 1, dd = dt.getDate();
    const dowLabel = ['日','一','二','三','四','五','六'][dt.getDay()];
    const week = 'W' + String(i+1).padStart(2,'0');
    const past = d < today ? ' (已過)' : '';
    const tag = d === today ? ' ← 今天' : '';
    return `<option value="${d}" ${d === currentDate ? 'selected' : ''}>${week} · ${m}/${dd}(週${dowLabel})${tag}${past}</option>`;
  }).join('');

  if (!dates.includes(currentDate)) {
    currentDate = pickDefaultDate(currentClass);
    sel.value = currentDate;
  }
}

// ---- 管理 modal ----
async function openManage() {
  $('manage-class-label').textContent = CLASS_LABELS[currentClass];
  $('manage-tbody').innerHTML = '<tr><td colspan="7" class="text-center text-gray-400 py-8">載入中…</td></tr>';
  $('manage-modal').classList.remove('hidden');
  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin/students?k=${encodeURIComponent(adminKey)}`);
    const j = await r.json();
    if (!j.ok) {
      $('manage-tbody').innerHTML = '<tr><td colspan="7" class="text-red-600">' + j.error + '</td></tr>';
      return;
    }
    adminStudents = j.students || [];
    renderManageTable();
  } catch (e) {
    $('manage-tbody').innerHTML = '<tr><td colspan="7" class="text-red-600">' + e.message + '</td></tr>';
  }
}
function renderManageTable() {
  const list = adminStudents.filter(s => s.class_code === currentClass);
  const STATUS_LABEL = { active:'正常', pending_payment:'待匯款', trial:'體驗', dropped:'退課' };
  $('manage-tbody').innerHTML = list.map(s => `
    <tr>
      <td class="text-gray-400 text-xs">${s.sort_order}</td>
      <td>${s.name}</td>
      <td>${s.vdot || '—'}</td>
      <td>${s.plan || '—'}</td>
      <td class="${s.status === 'dropped' ? 'text-gray-400' : ''}">${STATUS_LABEL[s.status] || s.status}</td>
      <td class="text-gray-500 text-xs max-w-xs truncate">${s.note || ''}</td>
      <td><button class="text-emerald-700 underline" data-edit="${s.id}">編輯</button></td>
    </tr>
  `).join('') || '<tr><td colspan="7" class="text-center text-gray-500 py-6">尚無學員</td></tr>';
  document.querySelectorAll('[data-edit]').forEach(el => {
    el.onclick = () => openEdit(Number(el.dataset.edit));
  });
}

function openEdit(id) {
  const s = id ? adminStudents.find(x => x.id === id) : null;
  $('edit-title').textContent = s ? '編輯：' + s.name : '新增學員';
  $('edit-class').value = s?.class_code || currentClass;
  $('edit-name').value  = s?.name || '';
  $('edit-vdot').value  = s?.vdot || '';
  $('edit-plan').value  = s?.plan || '';
  $('edit-status').value= s?.status || 'active';
  $('edit-sort').value  = s?.sort_order ?? 999;
  $('edit-note').value  = s?.note || '';
  $('edit-modal').dataset.id = id || '';
  $('edit-delete').classList.toggle('hidden', !id);
  $('edit-modal').classList.remove('hidden');
}

async function saveEdit() {
  const id = $('edit-modal').dataset.id;
  const body = {
    class_code: $('edit-class').value,
    name:       $('edit-name').value.trim(),
    vdot:       $('edit-vdot').value.trim(),
    plan:       $('edit-plan').value.trim(),
    status:     $('edit-status').value,
    sort_order: Number($('edit-sort').value) || 999,
    note:       $('edit-note').value.trim(),
  };
  if (!body.name) return alert('姓名必填');
  if (id) body.id = Number(id);

  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin/student?k=${encodeURIComponent(adminKey)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.ok) return alert(j.error);
    $('edit-modal').classList.add('hidden');
    await openManage();
    await loadClass();
  } catch (e) { alert('儲存失敗：' + e.message); }
}

async function deleteStudent() {
  const id = $('edit-modal').dataset.id;
  if (!id) return;
  if (!confirm('確定刪除？此操作會連同點名紀錄一併刪除。')) return;
  try {
    const r = await fetch(`${API_BASE}/api/attendance/admin/student?k=${encodeURIComponent(adminKey)}&id=${id}`, {
      method: 'DELETE',
    });
    const j = await r.json();
    if (!j.ok) return alert(j.error);
    $('edit-modal').classList.add('hidden');
    await openManage();
    await loadClass();
  } catch (e) { alert('刪除失敗：' + e.message); }
}

// ---- 登入流程 ----
function showPinForm() {
  $('main').classList.add('hidden');
  $('k-form').classList.add('hidden');
  $('pin-form').classList.remove('hidden');
  $('pin-input').focus();
}
function showKForm() {
  $('main').classList.add('hidden');
  $('pin-form').classList.add('hidden');
  $('k-form').classList.remove('hidden');
  $('k-input').focus();
}
function enterMain() {
  $('pin-form').classList.add('hidden');
  $('k-form').classList.add('hidden');
  $('main').classList.remove('hidden');
  $('manage-btn').classList.toggle('hidden', !isAdmin());
  $('logout-btn').classList.toggle('hidden', !isAdmin());
  renderTabs();
  renderDateOptions();
  loadClass();
}

function init() {
  // 入口判斷：有 c=tc-tue 就是助教模式（要 PIN），否則是 Jesse 模式（要 ADMIN_KEY）
  if (pinClass && CLASS_LABELS[pinClass] && !adminKey) {
    if (!pinValue) {
      showPinForm();
    } else {
      currentClass = pinClass;
      currentDate = pickDefaultDate(currentClass);
      enterMain();
    }
  } else {
    // Jesse 模式
    if (!adminKey) {
      showKForm();
    } else {
      currentDate = pickDefaultDate(currentClass);
      enterMain();
    }
  }

  $('pin-submit').onclick = () => {
    const v = $('pin-input').value.trim();
    if (!v) return;
    pinValue = v;
    localStorage.setItem('att_pin_' + pinClass, pinValue);
    currentClass = pinClass;
    currentDate = pickDefaultDate(currentClass);
    enterMain();
  };
  $('pin-input').onkeydown = (e) => { if (e.key === 'Enter') $('pin-submit').click(); };

  $('k-submit').onclick = () => {
    const v = $('k-input').value.trim();
    if (!v) return;
    adminKey = v;
    localStorage.setItem('att_admin_key', adminKey);
    currentDate = pickDefaultDate(currentClass);
    enterMain();
  };
  $('k-input').onkeydown = (e) => { if (e.key === 'Enter') $('k-submit').click(); };

  $('logout-btn').onclick = () => {
    localStorage.removeItem('att_admin_key');
    location.reload();
  };
  $('reload-btn').onclick = loadClass;
  $('date-input').onchange = () => { currentDate = $('date-input').value; loadClass(); };
  $('manage-btn').onclick = openManage;
  $('manage-close').onclick = () => $('manage-modal').classList.add('hidden');
  $('manage-add').onclick = () => openEdit(null);
  $('edit-cancel').onclick = () => $('edit-modal').classList.add('hidden');
  $('edit-save').onclick = saveEdit;
  $('edit-delete').onclick = deleteStudent;
  $('edit-modal').onclick = (e) => { if (e.target === $('edit-modal')) $('edit-modal').classList.add('hidden'); };
  $('manage-modal').onclick = (e) => { if (e.target === $('manage-modal')) $('manage-modal').classList.add('hidden'); };
}

init();
</script>
